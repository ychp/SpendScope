name: Publish unsigned macOS release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag（例如 v0.2.0，需与项目版本一致）"
        required: true
        type: string
      highlights:
        description: "版本亮点，多条请用 | 分隔"
        required: true
        type: string
      prerelease:
        description: "标记为预发布版本"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  publish:
    name: Test, package, and publish
    # SpendScope is developed with Xcode 26 and uses Swift 6 language features.
    runs-on: macos-26
    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      ARTIFACT_NAME: SpendScope-macOS-unsigned.dmg
      TAG: ${{ inputs.tag }}
      RELEASE_HIGHLIGHTS: ${{ inputs.highlights }}
      RELEASE_NOTES_FILE: ${{ runner.temp }}/SpendScope-release-notes.md
      PRERELEASE: ${{ inputs.prerelease }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Validate release version
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid tag: $TAG. Expected a semantic version such as v0.2.0 or v0.2.0-beta.1."
            exit 1
          fi

          xcodebuild \
            -project SpendScope.xcodeproj \
            -scheme SpendScope \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            -showBuildSettings \
            > "$RUNNER_TEMP/SpendScope-build-settings.txt"
          project_version="$(awk '/ MARKETING_VERSION = / { print $3; exit }' "$RUNNER_TEMP/SpendScope-build-settings.txt")"
          tag_version="${TAG#v}"
          tag_version="${tag_version%%-*}"
          if [[ -z "$project_version" || "$project_version" != "$tag_version" ]]; then
            echo "Tag version $tag_version does not match MARKETING_VERSION ${project_version:-<missing>}."
            exit 1
          fi

      - name: Run tests
        run: >-
          xcodebuild
          -project SpendScope.xcodeproj
          -scheme SpendScope
          -configuration Debug
          -destination 'platform=macOS'
          -derivedDataPath "$DERIVED_DATA"
          CODE_SIGNING_ALLOWED=NO
          test

      - name: Build Release app
        run: >-
          xcodebuild
          -project SpendScope.xcodeproj
          -scheme SpendScope
          -configuration Release
          -destination 'platform=macOS'
          -derivedDataPath "$DERIVED_DATA"
          CODE_SIGNING_ALLOWED=NO
          ARCHS='arm64 x86_64'
          ONLY_ACTIVE_ARCH=NO
          build

      - name: Create unsigned DMG
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/Release/SpendScope.app"
          test -d "$APP_PATH"
          ARCHITECTURES="$(lipo -archs "$APP_PATH/Contents/MacOS/SpendScope")"
          [[ " $ARCHITECTURES " == *" arm64 "* ]]
          [[ " $ARCHITECTURES " == *" x86_64 "* ]]
          mkdir -p dist dmg-root
          ditto "$APP_PATH" "dmg-root/SpendScope.app"
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "SpendScope" -srcfolder dmg-root -ov -format UDZO "dist/$ARTIFACT_NAME"
          (
            cd dist
            shasum -a 256 "$ARTIFACT_NAME" > "$ARTIFACT_NAME.sha256"
          )

      - name: Generate release notes
        run: |
          ./script/generate_release_notes.sh \
            "$TAG" \
            "$RELEASE_NOTES_FILE" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"

      - name: Publish GitHub Release
        run: |
          release_title="SpendScope $TAG"
          assets=(
            "dist/$ARTIFACT_NAME"
            "dist/$ARTIFACT_NAME.sha256"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            legacy_assets=(
              "SpendScope-$TAG-source.zip"
              "SpendScope-$TAG-source.tar.gz"
              "SHA256SUMS.txt"
            )
            for legacy_asset in "${legacy_assets[@]}"; do
              if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fqx "$legacy_asset"; then
                gh release delete-asset "$TAG" "$legacy_asset" --yes
              fi
            done

            gh release upload "$TAG" "${assets[@]}" --clobber
            gh release edit "$TAG" \
              --title "$release_title" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --prerelease="$PRERELEASE"
            if [[ "$PRERELEASE" != "true" ]]; then
              gh release edit "$TAG" --latest
            fi
          else
            release_flags=(
              --target "$GITHUB_SHA"
              --title "$release_title"
              --notes-file "$RELEASE_NOTES_FILE"
            )
            if [[ "$PRERELEASE" == "true" ]]; then
              release_flags+=(--prerelease --latest=false)
            else
              release_flags+=(--latest)
            fi
            gh release create "$TAG" "${assets[@]}" "${release_flags[@]}"
          fi
