name: Publish unsigned macOS release

on:
  workflow_dispatch:
    inputs:
      highlights:
        description: "版本亮点，多条请用 | 分隔"
        required: true
        type: string
      prerelease:
        description: "标记为预发布版本"
        required: true
        default: false
        type: boolean
      replace_existing:
        description: "覆盖同版本已有 Release（仅用于修复发布附件）"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: unsigned-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Test, package, and publish
    # SpendScope is developed with Xcode 26 and uses Swift 6 language features.
    runs-on: macos-26
    env:
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      ARTIFACT_NAME: SpendScope-macOS-unsigned.dmg
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      VERSION_CONFIG: Config/Version.xcconfig
      RELEASE_HIGHLIGHTS: ${{ inputs.highlights }}
      RELEASE_NOTES_FILE: ${{ github.workspace }}/SpendScope-release-notes.md
      PRERELEASE: ${{ inputs.prerelease }}
      REPLACE_EXISTING: ${{ inputs.replace_existing }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release branch
        run: |
          if [[ "$GITHUB_REF_NAME" != "$DEFAULT_BRANCH" ]]; then
            echo "Releases must run from the default branch $DEFAULT_BRANCH, not $GITHUB_REF_NAME."
            exit 1
          fi

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Load release version
        run: |
          marketing_version="$(awk -F '=' '/^[[:space:]]*MARKETING_VERSION[[:space:]]*=/ { gsub(/[[:space:]]/, "", $2); print $2; exit }' "$VERSION_CONFIG")"
          build_number="$(awk -F '=' '/^[[:space:]]*CURRENT_PROJECT_VERSION[[:space:]]*=/ { gsub(/[[:space:]]/, "", $2); print $2; exit }' "$VERSION_CONFIG")"

          if [[ ! "$marketing_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid MARKETING_VERSION in $VERSION_CONFIG: ${marketing_version:-<missing>}"
            exit 1
          fi
          if [[ ! "$build_number" =~ ^[1-9][0-9]*$ ]]; then
            echo "Invalid CURRENT_PROJECT_VERSION in $VERSION_CONFIG: ${build_number:-<missing>}"
            exit 1
          fi

          tag="v$marketing_version"
          if [[ "$PRERELEASE" == "true" ]]; then
            tag="$tag-beta"
          fi
          {
            echo "TAG=$tag"
            echo "MARKETING_VERSION=$marketing_version"
            echo "BUILD_NUMBER=$build_number"
          } >> "$GITHUB_ENV"

      - name: Validate release target
        run: |
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Invalid tag: $TAG. Expected a semantic version such as v0.2.0 or v0.2.0-beta."
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1 && [[ "$REPLACE_EXISTING" != "true" ]]; then
            echo "Release $TAG already exists. Increment $VERSION_CONFIG before a new release, or enable replace_existing to repair its assets."
            exit 1
          fi

          xcodebuild \
            -project SpendScope.xcodeproj \
            -scheme SpendScope \
            -configuration Release \
            -destination 'platform=macOS' \
            -derivedDataPath "$DERIVED_DATA" \
            -showBuildSettings \
            > "$RUNNER_TEMP/SpendScope-build-settings.txt"
          project_version="$(awk '/ MARKETING_VERSION = / { print $3; exit }' "$RUNNER_TEMP/SpendScope-build-settings.txt")"
          project_build="$(awk '/ CURRENT_PROJECT_VERSION = / { print $3; exit }' "$RUNNER_TEMP/SpendScope-build-settings.txt")"
          if [[ "$project_version" != "$MARKETING_VERSION" ]]; then
            echo "Xcode MARKETING_VERSION ${project_version:-<missing>} does not match $VERSION_CONFIG ($MARKETING_VERSION)."
            exit 1
          fi
          if [[ "$project_build" != "$BUILD_NUMBER" ]]; then
            echo "Xcode CURRENT_PROJECT_VERSION ${project_build:-<missing>} does not match $VERSION_CONFIG ($BUILD_NUMBER)."
            exit 1
          fi

      - name: Run tests
        run: >-
          xcodebuild
          -project SpendScope.xcodeproj
          -scheme SpendScope
          -configuration Debug
          -destination 'platform=macOS'
          -derivedDataPath "$DERIVED_DATA"
          CODE_SIGNING_ALLOWED=NO
          test

      - name: Build Release app
        run: >-
          xcodebuild
          -project SpendScope.xcodeproj
          -scheme SpendScope
          -configuration Release
          -destination 'platform=macOS'
          -derivedDataPath "$DERIVED_DATA"
          CODE_SIGNING_ALLOWED=NO
          ARCHS='arm64 x86_64'
          ONLY_ACTIVE_ARCH=NO
          build

      - name: Create unsigned DMG
        run: |
          APP_PATH="$DERIVED_DATA/Build/Products/Release/SpendScope.app"
          test -d "$APP_PATH"
          ARCHITECTURES="$(lipo -archs "$APP_PATH/Contents/MacOS/SpendScope")"
          [[ " $ARCHITECTURES " == *" arm64 "* ]]
          [[ " $ARCHITECTURES " == *" x86_64 "* ]]
          mkdir -p dist dmg-root
          ditto "$APP_PATH" "dmg-root/SpendScope.app"
          ln -s /Applications dmg-root/Applications
          hdiutil create -volname "SpendScope" -srcfolder dmg-root -ov -format UDZO "dist/$ARTIFACT_NAME"
          (
            cd dist
            shasum -a 256 "$ARTIFACT_NAME" > "$ARTIFACT_NAME.sha256"
          )

      - name: Generate release notes
        run: |
          ./script/generate_release_notes.sh \
            "$TAG" \
            "$RELEASE_NOTES_FILE" \
            "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY"

      - name: Publish GitHub Release
        run: |
          release_title="SpendScope $TAG"
          assets=(
            "dist/$ARTIFACT_NAME"
            "dist/$ARTIFACT_NAME.sha256"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            legacy_assets=(
              "SpendScope-$TAG-source.zip"
              "SpendScope-$TAG-source.tar.gz"
              "SHA256SUMS.txt"
            )
            for legacy_asset in "${legacy_assets[@]}"; do
              if gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fqx "$legacy_asset"; then
                gh release delete-asset "$TAG" "$legacy_asset" --yes
              fi
            done

            gh release upload "$TAG" "${assets[@]}" --clobber
            gh release edit "$TAG" \
              --title "$release_title" \
              --notes-file "$RELEASE_NOTES_FILE" \
              --prerelease="$PRERELEASE"
            if [[ "$PRERELEASE" != "true" ]]; then
              gh release edit "$TAG" --latest
            fi
          else
            release_flags=(
              --target "$GITHUB_SHA"
              --title "$release_title"
              --notes-file "$RELEASE_NOTES_FILE"
            )
            if [[ "$PRERELEASE" == "true" ]]; then
              release_flags+=(--prerelease --latest=false)
            else
              release_flags+=(--latest)
            fi
            gh release create "$TAG" "${assets[@]}" "${release_flags[@]}"
          fi
